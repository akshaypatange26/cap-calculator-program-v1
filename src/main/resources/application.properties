spring.application.name=Calculator
server.port=8080
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
openapi.basicCalculator.base-path=/api
# Jackson Configuration - Exclude null values from JSON serialization
spring.jackson.default-property-inclusion=non_null

# DataSource Configuration for Oracle Free (FREEPDB1 pluggable DB)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=CALCULATOR_USER
spring.datasource.password=Password123

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true